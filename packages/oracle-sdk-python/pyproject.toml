[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "vinyan-oracle-sdk"
version = "0.1.0"
description = "Python SDK for building Vinyan ECP oracles"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]

[tool.hatch.build.targets.wheel]
packages = ["vinyan_oracle_sdk"]
